<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройка печати</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Единые CSS классы для всех страниц */
        :root {
            --primary-color: #ff8c00;
            --secondary-color: #ff5722;
            --bg-gradient: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            --text-color: #333;
            --card-bg: #ffffff;
            --border-radius: 12px; /* Аккуратные скругления, без круглых форм */
        }

        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .screen {
            display: none;
            padding: 20px;
            flex: 1;
        }

        .screen.active {
            display: block;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn {
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            border: none;
            border-radius: var(--border-radius);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f0f0f0;
            color: #333;
            transition: background 0.2s;
        }

        .btn:active {
            background: #e0e0e0;
        }

        .btn--info {
            background: transparent;
            width: auto;
            padding: 5px 10px;
            font-size: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .preview-container {
            width: 100%;
            height: 200px;
            background: #eee;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-top: 10px;
        }

        .preview-image {
            max-width: 100%;
            max-height: 100%;
            display: none;
        }

        /* Выпадающая информация */
        .info-block {
            display: none;
            background: #e3f2fd;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="screen-home" class="screen active">
        <div class="header">
            <h2>🖨 Принт Сервис</h2>
            <p>Выберите тип печати</p>
        </div>
        
        <div class="card">
            <button class="btn" onclick="openScreen('screen-photo')">
                📸 Фотопечать
                <span class="btn--info" onclick="event.stopPropagation(); toggleInfo('info-photo')">ℹ️</span>
            </button>
            <div id="info-photo" class="info-block">
                Печать фотографий. Доступны фильтры, загрузка и предпросмотр изображения.
            </div>

            <button class="btn" onclick="openScreen('screen-bw')">
                📄 Ч/Б Печать
                <span class="btn--info" onclick="event.stopPropagation(); toggleInfo('info-bw')">ℹ️</span>
            </button>
            <div id="info-bw" class="info-block">
                Черно-белая печать документов. Настройка количества сторон.
            </div>
        </div>
    </div>

    <div id="screen-photo" class="screen">
        <div class="header">
            <h2>📸 Фотопечать</h2>
            <p>Настройки изображения</p>
        </div>
        <div class="card">
            <div class="form-group">
                <label>Фото для предпросмотра:</label>
                <input type="file" class="form-control" accept="image/*" id="photo-input">
            </div>
            <div class="preview-container">
                <span id="photo-placeholder">Предпросмотр</span>
                <img id="photo-preview" class="preview-image" src="" alt="Preview">
            </div>
            <div class="form-group" style="margin-top: 15px;">
                <label>Формат / Фильтр:</label>
                <select id="photo-filter" class="form-control">
                    <option value="none">Оригинал</option>
                    <option value="bw">Черно-белое</option>
                    <option value="crop">С обрезкой по краям</option>
                    <option value="fit">С белыми полями</option>
                </select>
            </div>
            <button class="btn" style="justify-content: center; background: #4CAF50; color: white;" onclick="savePhotoSettings()">Далее</button>
            <button class="btn" style="justify-content: center; background: #ddd;" onclick="openScreen('screen-home')">Назад</button>
        </div>
    </div>

    <div id="screen-bw" class="screen">
        <div class="header">
            <h2>📄 Ч/Б Печать</h2>
            <p>Настройки документа</p>
        </div>
        <div class="card">
            <div class="form-group">
                <label>Стороны:</label>
                <select id="bw-sides" class="form-control">
                    <option value="1">📄 Одна сторона</option>
                    <option value="2">📖 Две стороны</option>
                </select>
            </div>
            <button class="btn" style="justify-content: center; background: #4CAF50; color: white;" onclick="saveBwSettings()">Далее</button>
            <button class="btn" style="justify-content: center; background: #ddd;" onclick="openScreen('screen-home')">Назад</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let finalSettings = {};

        // Переключение общих классов (экранов)
        function openScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            tg.MainButton.hide();
        }

        // Показ информации по кнопкам "i"
        function toggleInfo(infoId) {
            const el = document.getElementById(infoId);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        // Локальный предпросмотр загруженного фото
        document.getElementById('photo-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('photo-preview').src = e.target.result;
                    document.getElementById('photo-preview').style.display = 'block';
                    document.getElementById('photo-placeholder').style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        function savePhotoSettings() {
            finalSettings = {
                type: 'photo',
                filter: document.getElementById('photo-filter').value
            };
            showMainButton();
        }

        function saveBwSettings() {
            finalSettings = {
                type: 'bw',
                sides: document.getElementById('bw-sides').value,
                color: 'bw'
            };
            showMainButton();
        }

        function showMainButton() {
            tg.MainButton.setText("ПОДТВЕРДИТЬ НАСТРОЙКИ").show();
        }

        tg.onEvent('mainButtonClicked', function() {
            // Отправляем выбранные параметры обратно в бота
            tg.sendData(JSON.stringify(finalSettings));
        });
    </script>
</body>
</html>
