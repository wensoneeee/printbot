<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройка печати</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); padding: 20px; }
        .section { margin-bottom: 20px; border: 1px solid #ccc; padding: 10px; border-radius: 10px; }
        button { width: 100%; padding: 15px; background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>🖨 Настройка печати</h2>
    
    <div class="section">
        <label>Цветность:</label>
        <select id="color">
            <option value="bw">Чёрно-белая (5₽)</option>
            <option value="color">Цветная (25₽)</option>
        </select>
    </div>

    <div class="section">
        <label>Стороны:</label>
        <select id="sides">
            <option value="1">Односторонняя</option>
            <option value="2">Двусторонняя</option>
        </select>
    </div>

    <button id="sendData">🔥 Отправить на печать</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширить на весь экран

        document.getElementById('sendData').addEventListener('click', () => {
            const data = {
                color: document.getElementById('color').value,
                sides: document.getElementById('sides').value
            };
            // Отправляем данные боту и закрываем окно
            tg.sendData(JSON.stringify(data));
        });
    </script>
</body>
</html>
