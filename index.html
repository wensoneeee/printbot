<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Принт Сервис</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #ff8c00, #ff5722);
            --bg-color: #f4f4f4;
            --card-bg: #ffffff;
            --text-main: #222222;
            --rect-radius: 4px; /* Строгие прямоугольные формы */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            background: var(--primary-gradient);
            color: var(--text-main);
            min-height: 100vh;
        }

        .container {
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        .screen { display: none; }
        .active { display: block; }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--rect-radius);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        /* Кнопки теперь прямоугольные */
        .btn-main {
            width: 100%;
            padding: 18px;
            margin-bottom: 12px;
            border: 2px solid #eee;
            background: white;
            border-radius: var(--rect-radius);
            font-size: 16px;
            font-weight: 700;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .btn-main:active { background: #f9f9f9; border-color: #ff8c00; }

        .btn-action {
            width: 100%;
            padding: 15px;
            background: #222;
            color: white;
            border: none;
            border-radius: var(--rect-radius);
            font-weight: bold;
            margin-top: 10px;
        }

        .btn-support {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid white;
            padding: 10px;
            width: 100%;
            border-radius: var(--rect-radius);
            font-weight: bold;
            margin-top: 40px;
        }

        .filter-preview {
            width: 100%;
            height: 120px;
            background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=300&q=80');
            background-size: cover;
            background-position: center;
            margin-bottom: 15px;
            border-radius: var(--rect-radius);
            transition: filter 0.3s;
        }

        /* CSS Фильтры */
        .f-none { filter: none; }
        .f-bw { filter: grayscale(100%); }
        .f-sepia { filter: sepia(100%); }
        .f-bright { filter: brightness(130%) contrast(110%); }

        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        select {
            width: 100%;
            padding: 12px;
            border-radius: var(--rect-radius);
            border: 1px solid #ccc;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .info-text { font-size: 13px; color: #666; margin-top: -10px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        
        <div id="home" class="screen active">
            <div class="header">
                <h1>🖨 Печать</h1>
                <p>Выберите нужный формат</p>
            </div>
            <div class="card">
                <button class="btn-main" onclick="showScreen('photo-settings')">
                    📸 Фотопечать <span>→</span>
                </button>
                <div class="info-text">Глянцевая бумага, разные фильтры</div>

                <button class="btn-main" onclick="showScreen('bw-settings')">
                    📄 Ч/Б Документы <span>→</span>
                </button>
                <div class="info-text">Обычный А4, быстрая печать</div>
            </div>
            <button class="btn-support" onclick="contactSupport()">🆘 ПОДДЕРЖКА</button>
        </div>

        <div id="photo-settings" class="screen">
            <div class="header"><h2>Настройки фото</h2></div>
            <div class="card">
                <label>Пример фильтра:</label>
                <div id="preview-box" class="filter-preview f-none"></div>
                
                <label>Выберите фильтр:</label>
                <select id="photo-filter" onchange="applyFilterPreview()">
                    <option value="none">Оригинал</option>
                    <option value="bw">Черно-белый (Классика)</option>
                    <option value="sepia">Сепия (Ретро)</option>
                    <option value="bright">Яркий (Насыщенный)</option>
                </select>

                <button class="btn-action" onclick="finish('photo')">ГОТОВО</button>
                <button class="btn-main" style="border:none; text-align:center; justify-content:center;" onclick="showScreen('home')">Назад</button>
            </div>
        </div>

        <div id="bw-settings" class="screen">
            <div class="header"><h2>Настройки Ч/Б</h2></div>
            <div class="card">
                <label>Количество сторон:</label>
                <select id="bw-sides">
                    <option value="1">📄 Одна сторона</option>
                    <option value="2">📖 Две стороны (Эконом)</option>
                </select>

                <button class="btn-action" onclick="finish('bw')">ГОТОВО</button>
                <button class="btn-main" style="border:none; text-align:center; justify-content:center;" onclick="showScreen('home')">Назад</button>
            </div>
        </div>

    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function applyFilterPreview() {
            const filter = document.getElementById('photo-filter').value;
            const preview = document.getElementById('preview-box');
            preview.className = 'filter-preview f-' + filter;
        }

        function contactSupport() {
            tg.sendData(JSON.stringify({action: 'support'}));
        }

        function finish(type) {
            let data = { type: type };
            if(type === 'photo') {
                data.filter = document.getElementById('photo-filter').value;
            } else {
                data.sides = document.getElementById('bw-sides').value;
            }
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
