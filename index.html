<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройка печати</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Добавим яркие цвета, чтобы сразу понять, что сайт загрузился */
        body { 
            font-family: sans-serif; 
            background-color: #f0f0f0; /* Светло-серый фон для теста */
            padding: 20px; 
            text-align: center;
        }
        .section { 
            background: white;
            margin-bottom: 15px; 
            padding: 15px; 
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background: #0088cc; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px;
            font-weight: bold;
        }
        select { width: 100%; padding: 10px; font-size: 16px; }
    </style>
</head>
<body>
    <h3>🖨 Настройки печати</h3>
    
    <div class="section">
        <label>Цветность:</label><br><br>
        <select id="color">
            <option value="bw">⚫️ ЧБ (5₽)</option>
            <option value="color">🌈 Цвет (25₽)</option>
        </select>
    </div>

    <div class="section">
        <label>Стороны:</label><br><br>
        <select id="sides">
            <option value="1">📄 Одна сторона</option>
            <option value="2">📖 Две стороны</option>
        </select>
    </div>

    <button id="sendData">Готово</button>

    <script>
        const tg = window.Telegram.WebApp;
        
        // Показываем кнопку только если мы в ТГ
        if (tg.initData) {
            tg.expand();
            tg.MainButton.setText("ОТПРАВИТЬ").show();
        }

        document.getElementById('sendData').addEventListener('click', () => {
            const data = {
                color: document.getElementById('color').value,
                sides: document.getElementById('sides').value
            };
            tg.sendData(json.stringify(data));
        });
        
        // Для ТГ кнопок внизу экрана
        tg.onEvent('mainButtonClicked', function(){
            const data = {
                color: document.getElementById('color').value,
                sides: document.getElementById('sides').value
            };
            tg.sendData(JSON.stringify(data));
        });
    </script>
</body>
</html>
